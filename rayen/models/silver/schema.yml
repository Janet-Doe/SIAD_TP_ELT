version: 2

models:
  - name: silver_beneficiaire
    description: "Couche silver des beneficiaires avec libelles metier."
    columns:
      - name: num_beneficiaire
        description: "Identifiant entier du beneficiaire."
        tests:
          - not_null
          - unique
      - name: sexe
        description: "Libelle sexe calcule depuis le code source."
        tests:
          - not_null
          - accepted_values:
              values: ['Homme', 'Femme']
      - name: regime_social
        description: "Libelle du regime social calcule depuis le code source."
        tests:
          - not_null
          - accepted_values:
              values: ['Agricole', 'General', 'Spécial']
  - name: beneficiaire_rejets
    description: "Lignes isolees car elles ne respectent pas les controles de fiabilite silver."
    columns:
      - name: num_beneficiaire
        description: "Identifiant brut du beneficiaire, si present."
      - name: sexe
        description: "Code sexe brut rejete."
      - name: regime_social
        description: "Code regime social brut rejete."
      - name: motif_rejet
        description: "Raison principale du rejet."
        tests:
          - not_null
          - accepted_values:
              values:
                - 'NUM_BENEFICIAIRE manquant'
                - 'NUM_BENEFICIAIRE non numerique'
                - 'NUM_BENEFICIAIRE duplique'
                - 'SEXE manquant'
                - 'REGIME_SOCIAL manquant'
