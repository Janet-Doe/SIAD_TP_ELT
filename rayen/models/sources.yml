version: 2

sources:
  - name: pg_bronze
    description: "Tables brutes deja chargees dans le schema PostgreSQL Bronze."
    database: "{{ env_var('DBT_POSTGRES_DB', 'Projet_Siad') }}"
    schema: "{{ env_var('DBT_RAW_SCHEMA', 'Bronze') }}"
    quoting:
      schema: true
    tables:
      - name: bronze_beneficiaire
        description: "Donnees beneficiaires importees brutes."
        columns:
          - name: num_beneficiaire
            description: "Identifiant du beneficiaire."
          - name: sexe
            description: "Code sexe brut."
          - name: regime_social
            description: "Code regime social brut."
  - name: pg_silver
    description: "Tables silver partagees par l'equipe."
    database: "{{ env_var('DBT_POSTGRES_DB', 'Projet_Siad') }}"
    schema: "{{ env_var('DBT_POSTGRES_SCHEMA', 'Silver') }}"
    quoting:
      schema: true
    tables:
      - name: silver_sinistre
        description: "Table silver des sinistres/prestations. Source attendue pour la fact Gold quand elle sera disponible."
