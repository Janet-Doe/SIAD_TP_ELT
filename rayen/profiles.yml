projet_elt_beneficiaire:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_POSTGRES_HOST', 'localhost') }}"
      user: "{{ env_var('DBT_POSTGRES_USER', 'postgres') }}"
      password: "{{ env_var('DBT_POSTGRES_PASSWORD', 'RAYEn1234') }}"
      port: "{{ env_var('DBT_POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('DBT_POSTGRES_DB', 'Projet_Siad') }}"
      schema: "{{ env_var('DBT_POSTGRES_SCHEMA', 'Silver') }}"
      threads: 4
      connect_timeout: 10
